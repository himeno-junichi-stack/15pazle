<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイフォト・スライディングパズル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .puzzle-board {
            display: grid;
            gap: 2px;
            background-color: #ccc;
            border: 4px solid #333;
            user-select: none;
        }
        .tile {
            cursor: pointer;
            transition: transform 0.1s ease-out;
        }
        .tile.empty {
            background: #eee !important;
            cursor: default;
        }
        .tile:hover:not(.empty) {
            filter: brightness(1.1);
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .shadow-text {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center py-8 px-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-400">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">マイフォトパズル</h1>

        <div class="flex flex-col gap-4 mb-6">
            <div class="flex justify-between items-center">
                <label class="font-medium text-gray-700">グリッドサイズ:</label>
                <select id="gridSize" class="bg-gray-50 border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-blue-300 outline-none">
                    <option value="3">3 x 3</option>
                    <option value="4" selected>4 x 4</option>
                    <option value="5">5 x 5</option>
                </select>
            </div>
            
            <div class="flex flex-col gap-2">
                <!-- ファイル選択用の隠しinput -->
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <button id="selectBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition shadow-md flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                    </svg>
                    写真を選択する
                </button>
                <button id="autoSolveBtn" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded transition shadow-md btn-disabled">
                    自動で解く
                </button>
            </div>
        </div>

        <div class="flex justify-around mb-4 text-sm font-semibold text-gray-600">
            <div>移動回数: <span id="moveCount" class="text-blue-600">0</span></div>
            <div id="status">画像を選んでね</div>
        </div>

        <div class="relative">
            <!-- パズルボード -->
            <div id="puzzleBoard" class="puzzle-board mx-auto w-full aspect-square hidden"></div>
            
            <!-- 勝利メッセージ -->
            <div id="winMsg" class="hidden absolute inset-0 flex items-center justify-center bg-blue-400 bg-opacity-40 rounded z-20 transition-all duration-500">
                <div class="text-center text-white p-6">
                    <p class="text-4xl font-bold mb-2 shadow-text">完成！</p>
                    <p class="mb-4 font-bold shadow-text">素晴らしい写真ですね！</p>
                    <button id="replayBtn" class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold shadow-xl hover:bg-blue-50 transition transform hover:scale-105">もう一度遊ぶ</button>
                </div>
            </div>
        </div>

        <div class="mt-6 flex gap-2">
            <button id="hintBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded text-sm font-medium border border-gray-200 btn-disabled">
                完成図を見る
            </button>
            <button id="shuffleBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded text-sm font-medium border border-gray-200 btn-disabled">
                シャッフル
            </button>
        </div>
    </div>

    <!-- ヒントモーダル -->
    <div id="hintModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white p-2 rounded-lg max-w-sm w-full relative shadow-2xl">
            <button id="closeHint" class="absolute -top-10 right-0 text-white text-xl font-bold flex items-center gap-1">
                <span>閉じる</span>
            </button>
            <img id="hintImage" src="" alt="Complete" class="w-full h-auto rounded">
        </div>
    </div>

    <script>
        let gridSize = 4;
        let tiles = [];
        let currentImgUrl = "";
        let moves = 0;
        let isWon = false;
        let isAutoSolving = false;

        const boardEl = document.getElementById('puzzleBoard');
        const moveCountEl = document.getElementById('moveCount');
        const statusEl = document.getElementById('status');
        const winMsgEl = document.getElementById('winMsg');
        const hintModal = document.getElementById('hintModal');
        const hintImage = document.getElementById('hintImage');
        const autoSolveBtn = document.getElementById('autoSolveBtn');
        const selectBtn = document.getElementById('selectBtn');
        const imageInput = document.getElementById('imageInput');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const hintBtn = document.getElementById('hintBtn');

        // ファイルが選択された時の処理
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                currentImgUrl = event.target.result;
                hintImage.src = currentImgUrl;
                
                // ボタン類を有効化
                autoSolveBtn.classList.remove('btn-disabled');
                shuffleBtn.classList.remove('btn-disabled');
                hintBtn.classList.remove('btn-disabled');
                
                initGame();
            };
            reader.readAsDataURL(file);
        });

        // ボタンクリックでinputをクリック
        selectBtn.onclick = () => imageInput.click();

        function initGame() {
            gridSize = parseInt(document.getElementById('gridSize').value);
            moves = 0;
            moveCountEl.textContent = moves;
            isWon = false;
            isAutoSolving = false;
            winMsgEl.classList.add('hidden');
            boardEl.classList.remove('hidden');
            
            boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            tiles = [];
            const totalTiles = gridSize * gridSize;
            for (let i = 0; i < totalTiles; i++) {
                tiles.push({
                    id: i,
                    correctPos: i,
                    currentPos: i,
                    isEmpty: i === totalTiles - 1
                });
            }

            shuffleTiles();
            renderBoard();
            statusEl.textContent = "プレイ中";
        }

        function shuffleTiles() {
            let emptyIdx = tiles.length - 1;
            const iterations = gridSize * gridSize * 30;
            for (let i = 0; i < iterations; i++) {
                const neighbors = getNeighbors(emptyIdx);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swapTilesByCurrentPos(emptyIdx, randomNeighbor);
                emptyIdx = randomNeighbor;
            }
            tiles.sort((a, b) => a.currentPos - b.currentPos);
        }

        function getNeighbors(idx) {
            const neighbors = [];
            const row = Math.floor(idx / gridSize);
            const col = idx % gridSize;
            if (row > 0) neighbors.push(idx - gridSize);
            if (row < gridSize - 1) neighbors.push(idx + gridSize);
            if (col > 0) neighbors.push(idx - 1);
            if (col < gridSize - 1) neighbors.push(idx + 1);
            return neighbors;
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = `tile aspect-square ${tile.isEmpty ? 'empty' : ''} border border-white/20`;
                if (!tile.isEmpty) {
                    div.style.backgroundImage = `url(${currentImgUrl})`;
                    div.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
                    const row = Math.floor(tile.id / gridSize);
                    const col = tile.id % gridSize;
                    div.style.backgroundPosition = `${(col / (gridSize - 1)) * 100}% ${(row / (gridSize - 1)) * 100}%`;
                }
                div.onclick = () => { if (!isAutoSolving) handleTileClick(index); };
                boardEl.appendChild(div);
            });
        }

        function swapTilesByCurrentPos(posA, posB) {
            const tileA = tiles.find(t => t.currentPos === posA);
            const tileB = tiles.find(t => t.currentPos === posB);
            if (tileA && tileB) {
                const temp = tileA.currentPos;
                tileA.currentPos = tileB.currentPos;
                tileB.currentPos = temp;
            }
        }

        function handleTileClick(index) {
            if (isWon || isAutoSolving) return;
            const emptyIndex = tiles.findIndex(t => t.isEmpty);
            const clickedRow = Math.floor(index / gridSize);
            const clickedCol = index % gridSize;
            const emptyRow = Math.floor(emptyIndex / gridSize);
            const emptyCol = emptyIndex % gridSize;
            const isAdjacent = (Math.abs(clickedRow - emptyRow) === 1 && clickedCol === emptyCol) ||
                               (Math.abs(clickedCol - emptyCol) === 1 && clickedRow === emptyRow);

            if (isAdjacent) {
                const tileAtClicked = tiles[index];
                const tileAtEmpty = tiles[emptyIndex];
                const tempPos = tileAtClicked.currentPos;
                tileAtClicked.currentPos = tileAtEmpty.currentPos;
                tileAtEmpty.currentPos = tempPos;
                tiles.sort((a, b) => a.currentPos - b.currentPos);
                moves++;
                moveCountEl.textContent = moves;
                renderBoard();
                checkWin();
            }
        }

        async function autoSolve() {
            if (isWon || isAutoSolving || !currentImgUrl) return;
            isAutoSolving = true;
            autoSolveBtn.classList.add('btn-disabled');
            selectBtn.classList.add('btn-disabled');
            shuffleBtn.classList.add('btn-disabled');
            statusEl.textContent = "AIが解いています...";
            while (!isWon && isAutoSolving) {
                const targetTile = tiles.find(t => t.id !== t.currentPos && !t.isEmpty);
                if (!targetTile) { checkWin(); break; }
                await new Promise(resolve => setTimeout(resolve, 80));
                const targetCorrectPos = targetTile.id;
                const tileAtTargetPos = tiles.find(t => t.currentPos === targetCorrectPos);
                if (tileAtTargetPos) {
                    const oldPos = targetTile.currentPos;
                    const newPos = targetCorrectPos;
                    targetTile.currentPos = newPos;
                    tileAtTargetPos.currentPos = oldPos;
                    tiles.sort((a, b) => a.currentPos - b.currentPos);
                    moves++;
                    moveCountEl.textContent = moves;
                    renderBoard();
                }
                checkWin();
            }
            isAutoSolving = false;
            autoSolveBtn.classList.remove('btn-disabled');
            selectBtn.classList.remove('btn-disabled');
            shuffleBtn.classList.remove('btn-disabled');
        }

        function checkWin() {
            const hasWon = tiles.every(tile => tile.id === tile.currentPos);
            if (hasWon) {
                isWon = true;
                winMsgEl.classList.remove('hidden');
                statusEl.textContent = "完成！";
                autoSolveBtn.classList.add('btn-disabled');
            }
        }

        autoSolveBtn.onclick = autoSolve;
        document.getElementById('replayBtn').onclick = initGame;
        shuffleBtn.onclick = () => { if (currentImgUrl) initGame(); };
        hintBtn.onclick = () => { if (currentImgUrl) hintModal.classList.remove('hidden'); };
        document.getElementById('closeHint').onclick = () => { hintModal.classList.add('hidden'); };
        window.onclick = (event) => { if (event.target == hintModal) hintModal.classList.add('hidden'); };

    </script>
</body>
</html>
